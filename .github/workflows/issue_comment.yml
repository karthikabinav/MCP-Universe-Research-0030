name: Auto Comment on Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Comment based on issue label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.issue.labels || []).map(label => label.name);
            let body = null;

            if (labels.includes('bug')) {
              body = 'Thank you. We will fix it.';
            } else if (labels.includes('feature')) {
              body = 'Thank you, we will consider to include this feature.';
            } else if (labels.includes('discussion')) {
              body = 'Thanks for starting this discussion! We welcome community input.';
            }

            if (!body) {
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
