name: Issue Comment Automation

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Post automatic comment based on label
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map((label) => label.name);
            let body = null;

            if (labels.includes('bug')) {
              body = 'Thank you. We will fix it.';
            } else if (labels.includes('feature')) {
              body = 'Thank you, we will consider to include this feature.';
            } else if (labels.includes('discussion')) {
              body = 'Thanks for starting this discussion! We welcome community input.';
            }

            if (!body) {
              return;
            }

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number
            });

            const alreadyCommented = comments.data.some((comment) => comment.body === body);

            if (alreadyCommented) {
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body
            });
