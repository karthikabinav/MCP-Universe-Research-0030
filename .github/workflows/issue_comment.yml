name: Label Commenter
on:
  issues:
    types: [labeled]

jobs:
  add-comment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check and comment
        uses: actions/github-script@v7
        with:
          script: |
            const label = context.payload.label.name;
            let msg = "";
            if (label === "bug") msg = "Thank you. We will fix it.";
            else if (label === "feature") msg = "Thank you, we will consider to include this feature.";
            else if (label === "discussion") msg = "Thanks for starting this discussion! We welcome community input.";
            if (msg) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: msg
              });
            }
