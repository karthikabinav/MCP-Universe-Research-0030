name: Issue Auto-Responder

on:
  issues:
    types: [opened, labeled]

jobs:
  respond:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labelNames = issue.labels.map(l => l.name);
            let comment = null;
            if (labelNames.includes('bug')) {
              comment = 'Thank you. We will fix it.';
            } else if (labelNames.includes('feature')) {
              comment = 'Thank you, we will consider to include this feature.';
            } else if (labelNames.includes('discussion')) {
              comment = 'Thanks for starting this discussion! We welcome community input.';
            }
            if (comment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: comment
              });
            }
